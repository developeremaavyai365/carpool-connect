services:
  - type: web
    name: carpool-connect
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend && npm install --prefix frontend --include=dev && npm run build --prefix frontend
    startCommand: cd backend && NODE_ENV=production node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "true"
      - key: SKIP_DEMO_SEED
        value: "false"
